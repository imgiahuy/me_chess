# Slick database configuration

# H2 in-memory database configuration (for testing)
h2mem {
  profile = "slick.jdbc.H2Profile$"
  db {
    connectionPool = disabled
    driver = "org.h2.Driver"
    url = "jdbc:h2:mem:chess;DB_CLOSE_DELAY=-1"
    user = "sa"
    password = ""
  }
}

# H2 file-based database configuration (for development/production)
h2file {
  profile = "slick.jdbc.H2Profile$"
  db {
    driver = "org.h2.Driver"
    url = "jdbc:h2:./data/chess;DB_CLOSE_DELAY=-1"
    user = "sa"
    password = ""
    connectionPool = "HikariCP"
    numThreads = 10
  }
}

# PostgreSQL database configuration (for production)
postgresql {
  profile = "slick.jdbc.PostgresProfile$"
  db {
    driver = "org.postgresql.Driver"
    url = "jdbc:postgresql://localhost:5432/chess"
    user = "chess_user"
    password = "chess_password"
    connectionPool = "HikariCP"
    numThreads = 10
    maxConnections = 10
    minConnections = 1
  }
}

# MongoDB database configuration (for production)
mongodb {
  host = "localhost"
  port = 27017
  database = "chess"
}

# Default database configuration
slick.db = ${postgresql}
