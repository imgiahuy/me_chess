services:
  # PostgreSQL Database Service
  postgres:
    image: postgres:15
    container_name: chess-postgres
    ports:
      - "5432:5432"
    networks:
      - chess-network
    environment:
      - POSTGRES_DB=chess
      - POSTGRES_USER=chess_user
      - POSTGRES_PASSWORD=chess_password
    volumes:
      - chess-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chess_user -d chess"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MongoDB Database Service
  mongodb:
    image: mongo:7
    container_name: chess-mongodb
    ports:
      - "27017:27017"
    networks:
      - chess-network
    environment:
      - MONGO_INITDB_DATABASE=chess
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # REST API Service
  rest-api:
    build:
      context: .
      dockerfile: rest-api/Dockerfile
    container_name: chess-rest-api
    ports:
      - "8085:8080"
    networks:
      - chess-network
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    environment:
      - JAVA_OPTS=-Xmx512m
      - MONGODB_HOST=mongodb
      - MONGODB_PORT=27017
      - MONGODB_DATABASE=chess
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/v1/chess/info"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Web Frontend Service
  web-frontend:
    build:
      context: web/frontend
      dockerfile: Dockerfile
    container_name: chess-web-frontend
    ports:
      - "3005:3000"
    networks:
      - chess-network
    depends_on:
      rest-api:
        condition: service_healthy
    environment:
      - REACT_APP_API_URL=http://localhost:8080

  # GUI Service (with X11 forwarding for display)
  gui:
    build:
      context: .
      dockerfile: gui/Dockerfile
    container_name: chess-gui
    networks:
      - chess-network
    depends_on:
      rest-api:
        condition: service_healthy
    environment:
      - DISPLAY=host.docker.internal:0
      - JAVA_OPTS=-Xmx256m
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # Note: For VcXsrv on Windows:
    # 1. Launch XLaunch with "Multiple windows" mode
    # 2. Select "Disable access control"
    # 3. Enable OpenGL in the Extra Settings
    # 4. Display number should be 0

  # TUI Service
  tui:
    build:
      context: .
      dockerfile: tui/Dockerfile
    container_name: chess-tui
    networks:
      - chess-network
    depends_on:
      rest-api:
        condition: service_healthy
    environment:
      - JAVA_OPTS=-Xmx256m
    stdin_open: true
    tty: true

networks:
  chess-network:
    driver: bridge

volumes:
  chess-data:
    driver: local
  mongo-data:
    driver: local
