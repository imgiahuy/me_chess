services:
  # Keycloak Identity Provider
  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: chess-keycloak
    ports:
      - "8081:8080"
    networks:
      - chess-network
    environment:
      - KEYCLOAK_ADMIN=admin
      - KEYCLOAK_ADMIN_PASSWORD=admin
      - KC_DB=postgres
      - KC_DB_URL=jdbc:postgresql://postgres:5432/keycloak
      - KC_DB_USERNAME=chess_user
      - KC_DB_PASSWORD=chess_password
      - KC_HOSTNAME=localhost
      - KC_HOSTNAME_PORT=8081
      - KC_HOSTNAME_STRICT=false
      - KC_HOSTNAME_STRICT_HTTPS=false
      - KC_HTTP_ENABLED=true
    command: start-dev --import-realm
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "timeout 5 bash -c 'cat < /dev/null > /dev/tcp/localhost/8080' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    volumes:
      - ./docker/keycloak-realm.json:/opt/keycloak/data/import/keycloak-realm.json

  # PostgreSQL Database Service
  postgres:
    image: postgres:15
    container_name: chess-postgres
    ports:
      - "5432:5432"
    networks:
      - chess-network
    environment:
      - POSTGRES_DB=chess
      - POSTGRES_USER=chess_user
      - POSTGRES_PASSWORD=chess_password
      - POSTGRES_MULTIPLE_DATABASES=keycloak
    volumes:
      - chess-data:/var/lib/postgresql/data
      - ./docker/init-postgres.sh:/docker-entrypoint-initdb.d/init-postgres.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chess_user -d chess"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MongoDB Database Service
  mongodb:
    image: mongo:7
    container_name: chess-mongodb
    ports:
      - "27017:27017"
    networks:
      - chess-network
    environment:
      - MONGO_INITDB_DATABASE=chess
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  # Kafka (with Zookeeper)
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: chess-zookeeper
    networks:
      - chess-network
    environment:
      - ZOOKEEPER_CLIENT_PORT=2181
      - ZOOKEEPER_TICK_TIME=2000
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 2181 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: chess-kafka
    ports:
      - "9092:9092"
    networks:
      - chess-network
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      - KAFKA_BROKER_ID=1
      - KAFKA_ZOOKEEPER_CONNECT=zookeeper:2181
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      - KAFKA_LISTENERS=PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=true
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:29092 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s

  # REST API Service
  rest-api:
    build:
      context: .
      dockerfile: rest-api/Dockerfile
    container_name: chess-rest-api
    ports:
      - "8085:8080"
    networks:
      - chess-network
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      - JAVA_OPTS=-Xmx512m
      - MONGODB_HOST=mongodb
      - MONGODB_PORT=27017
      - MONGODB_DATABASE=chess
      - KAFKA_ENABLED=true
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - SPARK_OUTPUT_PATH=/tmp/chess-analytics
      - PLAYER_SERVICE_URL=http://player-service:8090
    volumes:
      - spark-results:/tmp/chess-analytics:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/v1/chess/info"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Player Microservice
  player-service:
    build:
      context: .
      dockerfile: player-service/Dockerfile
    container_name: chess-player-service
    ports:
      - "8090:8090"
    networks:
      - chess-network
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      - JAVA_OPTS=-Xmx256m
      - MONGODB_HOST=mongodb
      - MONGODB_PORT=27017
      - MONGODB_DATABASE=chess
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8090/v1/players/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # Web Frontend Service
  web-frontend:
    build:
      context: web/frontend
      dockerfile: Dockerfile
    container_name: chess-web-frontend
    ports:
      - "3005:3000"
    networks:
      - chess-network
    depends_on:
      rest-api:
        condition: service_healthy
      player-service:
        condition: service_healthy
    environment:
      - REACT_APP_API_URL=http://rest-api:8080
      - API_UPSTREAM=rest-api:8080
      - PLAYER_SERVICE_UPSTREAM=player-service:8090

  # GUI Service (with X11 forwarding for display) - Desktop only, commented out
  # gui:
  #   build:
  #     context: .
  #     dockerfile: gui/Dockerfile
  #   container_name: chess-gui
  #   networks:
  #     - chess-network
  #   depends_on:
  #     rest-api:
  #       condition: service_healthy
  #   environment:
  #     - DISPLAY=host.docker.internal:0
  #     - JAVA_OPTS=-Xmx256m
  #   extra_hosts:
  #     - "host.docker.internal:host-gateway"
  #   # Note: For VcXsrv on Windows:
  #   # 1. Launch XLaunch with "Multiple windows" mode
  #   # 2. Select "Disable access control"
  #   # 3. Enable OpenGL in the Extra Settings
  #   # 4. Display number should be 0

  # TUI Service - Desktop only, commented out
  # tui:
  #   build:
  #     context: .
  #     dockerfile: tui/Dockerfile
  #   container_name: chess-tui
  #   networks:
  #     - chess-network
  #   depends_on:
  #     rest-api:
  #       condition: service_healthy
  #   environment:
  #     - JAVA_OPTS=-Xmx256m
  #   stdin_open: true
  #   tty: true

  # Spark Analytics Service - initial run on startup
  spark:
    build:
      context: .
      dockerfile: spark/Dockerfile
    container_name: chess-spark
    networks:
      - chess-network
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      - JAVA_OPTS=-Xmx1g
      - MONGODB_URI=mongodb://mongodb:27017
      - MONGODB_DATABASE=chess
      - SPARK_OUTPUT_PATH=/tmp/chess-analytics
    volumes:
      - ./sample_games.pgn:/tmp/sample_games.pgn:ro
      - spark-results:/tmp/chess-analytics
    command: ["mongo"]

  # Spark Scheduler - re-runs analytics every 5 minutes
  spark-scheduler:
    build:
      context: .
      dockerfile: spark/Dockerfile
    container_name: chess-spark-scheduler
    restart: always
    networks:
      - chess-network
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      - JAVA_OPTS=-Xmx1g
      - MONGODB_URI=mongodb://mongodb:27017
      - MONGODB_DATABASE=chess
      - SPARK_OUTPUT_PATH=/tmp/chess-analytics
      - REFRESH_INTERVAL_SECONDS=300
    volumes:
      - ./sample_games.pgn:/tmp/sample_games.pgn:ro
      - spark-results:/tmp/chess-analytics
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "Spark scheduler started - refreshing every ${REFRESH_INTERVAL_SECONDS}s"
        while true; do
          echo "$(date): Running Spark analytics..."
          java --add-opens=java.base/sun.nio.ch=ALL-UNNAMED \
               --add-opens=java.base/java.io=ALL-UNNAMED \
               --add-opens=java.base/java.lang=ALL-UNNAMED \
               --add-opens=java.base/java.util=ALL-UNNAMED \
               -Dspark.ui.enabled=false \
               -jar /app/chess-spark.jar mongo
          echo "$(date): Analytics complete. Sleeping ${REFRESH_INTERVAL_SECONDS}s..."
          sleep ${REFRESH_INTERVAL_SECONDS}
        done

networks:
  chess-network:
    driver: bridge

volumes:
  chess-data:
    driver: local
  mongo-data:
    driver: local
  spark-results:
    driver: local
