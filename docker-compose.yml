services:
  # Keycloak Identity Provider
  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: chess-keycloak
    ports:
      - "8081:8080"
    networks:
      - chess-network
    environment:
      - KEYCLOAK_ADMIN=admin
      - KEYCLOAK_ADMIN_PASSWORD=admin
      - KC_DB=postgres
      - KC_DB_URL=jdbc:postgresql://postgres:5432/keycloak
      - KC_DB_USERNAME=chess_user
      - KC_DB_PASSWORD=chess_password
      - KC_HOSTNAME=localhost
      - KC_HOSTNAME_PORT=8081
      - KC_HOSTNAME_STRICT=false
      - KC_HOSTNAME_STRICT_HTTPS=false
      - KC_HTTP_ENABLED=true
    command: start-dev --import-realm
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health/ready"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    volumes:
      - ./docker/keycloak-realm.json:/opt/keycloak/data/import/keycloak-realm.json

  # PostgreSQL Database Service
  postgres:
    image: postgres:15
    container_name: chess-postgres
    ports:
      - "5432:5432"
    networks:
      - chess-network
    environment:
      - POSTGRES_DB=chess
      - POSTGRES_USER=chess_user
      - POSTGRES_PASSWORD=chess_password
      - POSTGRES_MULTIPLE_DATABASES=keycloak
    volumes:
      - chess-data:/var/lib/postgresql/data
      - ./docker/init-postgres.sh:/docker-entrypoint-initdb.d/init-postgres.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chess_user -d chess"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MongoDB Database Service
  mongodb:
    image: mongo:7
    container_name: chess-mongodb
    ports:
      - "27017:27017"
    networks:
      - chess-network
    environment:
      - MONGO_INITDB_DATABASE=chess
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # REST API Service
  rest-api:
    build:
      context: .
      dockerfile: rest-api/Dockerfile
    container_name: chess-rest-api
    ports:
      - "8085:8080"
    networks:
      - chess-network
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      - JAVA_OPTS=-Xmx512m
      - MONGODB_HOST=mongodb
      - MONGODB_PORT=27017
      - MONGODB_DATABASE=chess
      - KAFKA_ENABLED=true
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - SPARK_OUTPUT_PATH=/tmp/chess-analytics
    volumes:
      - spark-results:/tmp/chess-analytics:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/v1/chess/info"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Web Frontend Service
  web-frontend:
    build:
      context: web/frontend
      dockerfile: Dockerfile
    container_name: chess-web-frontend
    ports:
      - "3005:3000"
    networks:
      - chess-network
    depends_on:
      rest-api:
        condition: service_healthy
    environment:
      - REACT_APP_API_URL=http://rest-api:8080
      - API_UPSTREAM=rest-api:8080

  # GUI Service (with X11 forwarding for display)
  gui:
    build:
      context: .
      dockerfile: gui/Dockerfile
    container_name: chess-gui
    networks:
      - chess-network
    depends_on:
      rest-api:
        condition: service_healthy
    environment:
      - DISPLAY=host.docker.internal:0
      - JAVA_OPTS=-Xmx256m
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # Note: For VcXsrv on Windows:
    # 1. Launch XLaunch with "Multiple windows" mode
    # 2. Select "Disable access control"
    # 3. Enable OpenGL in the Extra Settings
    # 4. Display number should be 0

  # TUI Service
  tui:
    build:
      context: .
      dockerfile: tui/Dockerfile
    container_name: chess-tui
    networks:
      - chess-network
    depends_on:
      rest-api:
        condition: service_healthy
    environment:
      - JAVA_OPTS=-Xmx256m
    stdin_open: true
    tty: true

  # Spark Analytics Service - initial run on startup
  spark:
    build:
      context: .
      dockerfile: spark/Dockerfile
    container_name: chess-spark
    networks:
      - chess-network
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      - JAVA_OPTS=-Xmx1g
      - MONGODB_URI=mongodb://mongodb:27017
      - MONGODB_DATABASE=chess
      - SPARK_OUTPUT_PATH=/tmp/chess-analytics
    volumes:
      - ./sample_games.pgn:/tmp/sample_games.pgn:ro
      - spark-results:/tmp/chess-analytics
    command: ["mongo"]

  # Spark Scheduler - re-runs analytics every 5 minutes
  spark-scheduler:
    build:
      context: .
      dockerfile: spark/Dockerfile
    container_name: chess-spark-scheduler
    restart: always
    networks:
      - chess-network
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      - JAVA_OPTS=-Xmx1g
      - MONGODB_URI=mongodb://mongodb:27017
      - MONGODB_DATABASE=chess
      - SPARK_OUTPUT_PATH=/tmp/chess-analytics
      - REFRESH_INTERVAL_SECONDS=300
    volumes:
      - ./sample_games.pgn:/tmp/sample_games.pgn:ro
      - spark-results:/tmp/chess-analytics
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "Spark scheduler started - refreshing every ${REFRESH_INTERVAL_SECONDS}s"
        while true; do
          echo "$(date): Running Spark analytics..."
          java --add-opens=java.base/sun.nio.ch=ALL-UNNAMED \
               --add-opens=java.base/java.io=ALL-UNNAMED \
               --add-opens=java.base/java.lang=ALL-UNNAMED \
               --add-opens=java.base/java.util=ALL-UNNAMED \
               -Dspark.ui.enabled=false \
               -jar /app/chess-spark.jar mongo
          echo "$(date): Analytics complete. Sleeping ${REFRESH_INTERVAL_SECONDS}s..."
          sleep ${REFRESH_INTERVAL_SECONDS}
        done

networks:
  chess-network:
    driver: bridge

volumes:
  chess-data:
    driver: local
  mongo-data:
    driver: local
  spark-results:
    driver: local
