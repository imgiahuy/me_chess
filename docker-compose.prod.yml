services:
  nginx:
    image: nginx:alpine
    container_name: chess-nginx
    ports:
      - "80:80"
    networks:
      - chess-network
    volumes:
      - ./docker/nginx-prod.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - keycloak
      - rest-api
      - web-frontend
      - kafka-ui

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: chess-keycloak
    networks:
      - chess-network
    environment:
      - KEYCLOAK_ADMIN=${KEYCLOAK_ADMIN:-admin}
      - KEYCLOAK_ADMIN_PASSWORD=${KEYCLOAK_ADMIN_PASSWORD:-admin}
      - KC_DB=postgres
      - KC_DB_URL=jdbc:postgresql://postgres:5432/keycloak
      - KC_DB_USERNAME=${POSTGRES_USER:-chess_user}
      - KC_DB_PASSWORD=${POSTGRES_PASSWORD:-chess_password}
      - KC_HOSTNAME=${PRODUCTION_HOST:-141.37.123.124}
      - KC_HOSTNAME_PORT=80
      - KC_HTTP_RELATIVE_PATH=/auth
      - KC_HOSTNAME_STRICT=false
      - KC_HOSTNAME_STRICT_HTTPS=false
      - KC_HTTP_ENABLED=true
      - KC_PROXY_HEADERS=xforwarded
    command: start-dev --import-realm
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/auth/health/ready"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    volumes:
      - ./docker/keycloak-realm.json:/opt/keycloak/data/import/keycloak-realm.json

  postgres:
    image: postgres:15
    container_name: chess-postgres
    ports:
      - "5432:5432"
    networks:
      - chess-network
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-chess}
      - POSTGRES_USER=${POSTGRES_USER:-chess_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-chess_password}
      - POSTGRES_MULTIPLE_DATABASES=keycloak
    volumes:
      - chess-data:/var/lib/postgresql/data
      - ./docker/init-postgres.sh:/docker-entrypoint-initdb.d/init-postgres.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chess_user -d chess"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:7
    container_name: chess-mongodb
    ports:
      - "27017:27017"
    networks:
      - chess-network
    environment:
      - MONGO_INITDB_DATABASE=chess
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongo", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: chess-zookeeper
    networks:
      - chess-network
    environment:
      - ZOOKEEPER_CLIENT_PORT=2181
      - ZOOKEEPER_TICK_TIME=2000

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: chess-kafka
    networks:
      - chess-network
    depends_on:
      - zookeeper
    environment:
      - KAFKA_BROKER_ID=1
      - KAFKA_ZOOKEEPER_CONNECT=zookeeper:2181
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:29092
      - KAFKA_LISTENERS=PLAINTEXT://0.0.0.0:29092
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=true
      - KAFKA_NUM_PARTITIONS=4
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:29092"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: chess-kafka-ui
    ports:
      - "8086:8080"
    networks:
      - chess-network
    depends_on:
      - kafka
    environment:
      - KAFKA_CLUSTERS_0_NAME=chess-cluster
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=kafka:29092
      - SERVER_SERVLET_CONTEXT_PATH=/kafka-ui

  rest-api:
    image: chess-rest-api:latest
    container_name: chess-rest-api
    ports:
      - "8085:8080"
    networks:
      - chess-network
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      - JAVA_OPTS=-Xmx512m
      - MONGODB_HOST=mongodb
      - MONGODB_PORT=27017
      - MONGODB_DATABASE=chess
      - KAFKA_ENABLED=true
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - SPARK_OUTPUT_PATH=/tmp/chess-analytics
    volumes:
      - spark-results:/tmp/chess-analytics:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/v1/chess/info"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  spark-scheduler:
    image: chess-spark:latest
    container_name: chess-spark-scheduler
    restart: always
    networks:
      - chess-network
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      - JAVA_OPTS=-Xmx1g
      - MONGODB_URI=mongodb://mongodb:27017
      - MONGODB_DATABASE=chess
      - SPARK_OUTPUT_PATH=/tmp/chess-analytics
      - REFRESH_INTERVAL_SECONDS=300
    volumes:
      - spark-results:/tmp/chess-analytics
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "Spark scheduler started - refreshing every ${REFRESH_INTERVAL_SECONDS}s"
        while true; do
          java --add-opens=java.base/sun.nio.ch=ALL-UNNAMED \
               --add-opens=java.base/java.io=ALL-UNNAMED \
               --add-opens=java.base/java.lang=ALL-UNNAMED \
               --add-opens=java.base/java.util=ALL-UNNAMED \
               -Dspark.ui.enabled=false \
               -jar /app/chess-spark.jar mongo
          echo "$(date): Analytics complete. Sleeping ${REFRESH_INTERVAL_SECONDS}s..."
          sleep ${REFRESH_INTERVAL_SECONDS}
        done

  web-frontend:
    image: chess-web-frontend:latest
    container_name: chess-web-frontend
    networks:
      - chess-network
    depends_on:
      rest-api:
        condition: service_healthy
    environment:
      - REACT_APP_API_URL=http://${PRODUCTION_HOST:-141.37.123.124}/v1
      - API_UPSTREAM=rest-api:8080

networks:
  chess-network:
    driver: bridge

volumes:
  chess-data:
    driver: local
  mongo-data:
    driver: local
  spark-results:
    driver: local
