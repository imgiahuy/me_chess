services:
  nginx-keycloak:
    image: nginx:alpine
    container_name: chess-nginx-keycloak
    ports:
      - "8081:80"
      - "8443:443"
    networks:
      - chess-network
    volumes:
      - ./docker/nginx-keycloak.conf:/etc/nginx/conf.d/default.conf
      - ./docker/ssl:/etc/nginx/ssl
    depends_on:
      - keycloak

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: chess-keycloak
    ports:
      - "8080:8080"
    networks:
      - chess-network
    environment:
      - KEYCLOAK_ADMIN=admin
      - KEYCLOAK_ADMIN_PASSWORD=admin
      - KC_DB=postgres
      - KC_DB_URL=jdbc:postgresql://postgres:5432/keycloak
      - KC_DB_USERNAME=chess_user
      - KC_DB_PASSWORD=chess_password
      - KC_HOSTNAME=141.37.123.124
      - KC_HOSTNAME_PORT=8443
      - KC_HOSTNAME_STRICT=false
      - KC_HOSTNAME_STRICT_HTTPS=false
      - KC_HTTP_ENABLED=true
      - KC_PROXY=edge
    command: start-dev --import-realm
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health/ready"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    volumes:
      - ./docker/keycloak-realm.json:/opt/keycloak/data/import/keycloak-realm.json

  postgres:
    image: postgres:15
    container_name: chess-postgres
    ports:
      - "5432:5432"
    networks:
      - chess-network
    environment:
      - POSTGRES_DB=chess
      - POSTGRES_USER=chess_user
      - POSTGRES_PASSWORD=chess_password
      - POSTGRES_MULTIPLE_DATABASES=keycloak
    volumes:
      - chess-data:/var/lib/postgresql/data
      - ./docker/init-postgres.sh:/docker-entrypoint-initdb.d/init-postgres.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chess_user -d chess"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:4.4
    container_name: chess-mongodb
    ports:
      - "27017:27017"
    networks:
      - chess-network
    environment:
      - MONGO_INITDB_DATABASE=chess
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongo", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  rest-api:
    image: chess-rest-api:latest
    container_name: chess-rest-api
    ports:
      - "8085:8080"
    networks:
      - chess-network
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    environment:
      - JAVA_OPTS=-Xmx512m
      - MONGODB_HOST=mongodb
      - MONGODB_PORT=27017
      - MONGODB_DATABASE=chess
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/v1/chess/info"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  web-frontend:
    image: chess-web-frontend:latest
    container_name: chess-web-frontend
    ports:
      - "3005:3000"
    networks:
      - chess-network
    depends_on:
      rest-api:
        condition: service_healthy
    environment:
      - REACT_APP_API_URL=http://rest-api:8080

networks:
  chess-network:
    driver: bridge

volumes:
  chess-data:
    driver: local
  mongo-data:
    driver: local
