apiVersion: v1
kind: ConfigMap
metadata:
  name: kafka-config
  namespace: chess
data:
  KAFKA_BROKER_ID: "1"
  KAFKA_ZOOKEEPER_CONNECT: "zookeeper:2181"
  KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:29092"
  KAFKA_LISTENERS: "PLAINTEXT://0.0.0.0:29092"
  KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
  KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
  KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
  KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: "0"
  KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
  KAFKA_NUM_PARTITIONS: "4"
  KAFKA_LOG_RETENTION_HOURS: "168"
---
apiVersion: v1
kind: Service
metadata:
  name: zookeeper
  namespace: chess
spec:
  selector:
    app: zookeeper
  ports:
  - port: 2181
    targetPort: 2181
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zookeeper
  namespace: chess
spec:
  replicas: 1
  selector:
    matchLabels:
      app: zookeeper
  template:
    metadata:
      labels:
        app: zookeeper
    spec:
      containers:
      - name: zookeeper
        image: confluentinc/cp-zookeeper:7.5.0
        ports:
        - containerPort: 2181
        env:
        - name: ZOOKEEPER_CLIENT_PORT
          value: "2181"
        - name: ZOOKEEPER_TICK_TIME
          value: "2000"
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: kafka
  namespace: chess
spec:
  selector:
    app: kafka
  ports:
  - port: 29092
    targetPort: 29092
    name: internal
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka
  namespace: chess
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kafka
  template:
    metadata:
      labels:
        app: kafka
    spec:
      enableServiceLinks: false
      containers:
      - name: kafka
        image: confluentinc/cp-kafka:7.5.0
        ports:
        - containerPort: 29092
        env:
        - name: KAFKA_BROKER_ID
          value: "1"
        - name: KAFKA_ZOOKEEPER_CONNECT
          value: "zookeeper:2181"
        - name: KAFKA_ADVERTISED_LISTENERS
          value: "PLAINTEXT://kafka:29092"
        - name: KAFKA_LISTENERS
          value: "PLAINTEXT://0.0.0.0:29092"
        - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
          value: "1"
        - name: KAFKA_TRANSACTION_STATE_LOG_MIN_ISR
          value: "1"
        - name: KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR
          value: "1"
        - name: KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS
          value: "0"
        - name: KAFKA_AUTO_CREATE_TOPICS_ENABLE
          value: "true"
        - name: KAFKA_NUM_PARTITIONS
          value: "4"
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
---
apiVersion: batch/v1
kind: Job
metadata:
  name: kafka-topics-init
  namespace: chess
spec:
  template:
    metadata:
      name: kafka-topics-init
    spec:
      restartPolicy: OnFailure
      containers:
      - name: kafka-topics-init
        image: confluentinc/cp-kafka:7.5.0
        command:
        - bash
        - -c
        - |
          echo "Creating Kafka topics for chess events..."
          
          # Wait for Kafka to be ready
          until kafka-topics --bootstrap-server kafka:29092 --list; do
            echo "Waiting for Kafka to be ready..."
            sleep 5
          done
          
          # Create chess event topics with appropriate settings
          kafka-topics --create --if-not-exists \
            --bootstrap-server kafka:29092 \
            --topic chess-events \
            --partitions 4 \
            --replication-factor 1
            
          kafka-topics --create --if-not-exists \
            --bootstrap-server kafka:29092 \
            --topic chess-game-created \
            --partitions 4 \
            --replication-factor 1
            
          kafka-topics --create --if-not-exists \
            --bootstrap-server kafka:29092 \
            --topic chess-move-made \
            --partitions 8 \
            --replication-factor 1
            
          kafka-topics --create --if-not-exists \
            --bootstrap-server kafka:29092 \
            --topic chess-game-ended \
            --partitions 4 \
            --replication-factor 1
            
          kafka-topics --create --if-not-exists \
            --bootstrap-server kafka:29092 \
            --topic chess-player-resigned \
            --partitions 4 \
            --replication-factor 1
            
          kafka-topics --create --if-not-exists \
            --bootstrap-server kafka:29092 \
            --topic chess-time-events \
            --partitions 4 \
            --replication-factor 1
            
          kafka-topics --create --if-not-exists \
            --bootstrap-server kafka:29092 \
            --topic chess-state-updates \
            --partitions 4 \
            --replication-factor 1
          
          echo "All topics created successfully!"
          echo "Listing all topics:"
          kafka-topics --list --bootstrap-server kafka:29092
