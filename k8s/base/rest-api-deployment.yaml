apiVersion: v1
kind: ConfigMap
metadata:
  name: rest-api-config
  namespace: chess
data:
  MONGODB_HOST: mongodb
  MONGODB_PORT: "27017"
  MONGODB_DATABASE: chess
  KAFKA_ENABLED: "true"
  KAFKA_BOOTSTRAP_SERVERS: kafka:29092
  SPARK_OUTPUT_PATH: /tmp/chess-analytics
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rest-api
  namespace: chess
spec:
  replicas: 2
  selector:
    matchLabels:
      app: rest-api
  template:
    metadata:
      labels:
        app: rest-api
    spec:
      containers:
      - name: rest-api
        image: chess-rest-api:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
        env:
        - name: JAVA_OPTS
          value: "-Xmx512m"
        - name: MONGODB_HOST
          valueFrom:
            configMapKeyRef:
              name: rest-api-config
              key: MONGODB_HOST
        - name: MONGODB_PORT
          valueFrom:
            configMapKeyRef:
              name: rest-api-config
              key: MONGODB_PORT
        - name: MONGODB_DATABASE
          valueFrom:
            configMapKeyRef:
              name: rest-api-config
              key: MONGODB_DATABASE
        - name: KAFKA_ENABLED
          valueFrom:
            configMapKeyRef:
              name: rest-api-config
              key: KAFKA_ENABLED
        - name: KAFKA_BOOTSTRAP_SERVERS
          valueFrom:
            configMapKeyRef:
              name: rest-api-config
              key: KAFKA_BOOTSTRAP_SERVERS
        - name: SPARK_OUTPUT_PATH
          valueFrom:
            configMapKeyRef:
              name: rest-api-config
              key: SPARK_OUTPUT_PATH
        volumeMounts:
        - name: spark-results
          mountPath: /tmp/chess-analytics
          readOnly: true
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /v1/chess/info
            port: 8080
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 10
        readinessProbe:
          httpGet:
            path: /v1/chess/info
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
      volumes:
      - name: spark-results
        persistentVolumeClaim:
          claimName: spark-results-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: rest-api
  namespace: chess
spec:
  selector:
    app: rest-api
  ports:
  - port: 8080
    targetPort: 8080
  type: ClusterIP
