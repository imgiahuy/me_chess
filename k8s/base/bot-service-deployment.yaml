apiVersion: v1
kind: ConfigMap
metadata:
  name: bot-service-config
  namespace: chess
data:
  BOT_TYPE: "greedy"
  LICHESS_BASE_URL: "https://lichess.org"
  ALLOW_RATED: "true"
  ALLOW_UNRATED: "true"
  ALLOWED_SPEEDS: "bullet,blitz,rapid,classical"
  ALLOWED_VARIANTS: "standard"
  MAX_INITIAL_TIME_SECONDS: "2147483647"
  MIN_INCREMENT_SECONDS: "0"
  BOT_HEALTH_HOST: "0.0.0.0"
  BOT_HEALTH_PORT: "8080"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bot-service
  namespace: chess
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bot-service
  template:
    metadata:
      labels:
        app: bot-service
    spec:
      containers:
      - name: bot-service
        image: chess-bot-service:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
        env:
        - name: JAVA_OPTS
          value: "-Xmx256m"
        - name: LICHESS_API_TOKEN
          valueFrom:
            secretKeyRef:
              name: lichess-secret
              key: LICHESS_API_TOKEN
        - name: BOT_TYPE
          valueFrom:
            configMapKeyRef:
              name: bot-service-config
              key: BOT_TYPE
        - name: LICHESS_BASE_URL
          valueFrom:
            configMapKeyRef:
              name: bot-service-config
              key: LICHESS_BASE_URL
        - name: ALLOW_RATED
          valueFrom:
            configMapKeyRef:
              name: bot-service-config
              key: ALLOW_RATED
        - name: ALLOW_UNRATED
          valueFrom:
            configMapKeyRef:
              name: bot-service-config
              key: ALLOW_UNRATED
        - name: ALLOWED_SPEEDS
          valueFrom:
            configMapKeyRef:
              name: bot-service-config
              key: ALLOWED_SPEEDS
        - name: ALLOWED_VARIANTS
          valueFrom:
            configMapKeyRef:
              name: bot-service-config
              key: ALLOWED_VARIANTS
        - name: MAX_INITIAL_TIME_SECONDS
          valueFrom:
            configMapKeyRef:
              name: bot-service-config
              key: MAX_INITIAL_TIME_SECONDS
        - name: MIN_INCREMENT_SECONDS
          valueFrom:
            configMapKeyRef:
              name: bot-service-config
              key: MIN_INCREMENT_SECONDS
        - name: BOT_HEALTH_HOST
          valueFrom:
            configMapKeyRef:
              name: bot-service-config
              key: BOT_HEALTH_HOST
        - name: BOT_HEALTH_PORT
          valueFrom:
            configMapKeyRef:
              name: bot-service-config
              key: BOT_HEALTH_PORT
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: bot-service
  namespace: chess
spec:
  selector:
    app: bot-service
  ports:
  - port: 8080
    targetPort: 8080
  type: ClusterIP
