apiVersion: v1
kind: ConfigMap
metadata:
  name: tournament-service-config
  namespace: chess
data:
  SERVICE_PORT: "8070"
  MONGODB_HOST: "mongodb"
  MONGODB_PORT: "27017"
  MONGODB_DATABASE: "chess"
  KAFKA_ENABLED: "false"
  KAFKA_BOOTSTRAP_SERVERS: "kafka:29092"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tournament-service
  namespace: chess
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tournament-service
  template:
    metadata:
      labels:
        app: tournament-service
    spec:
      containers:
      - name: tournament-service
        image: chess-tournament-service:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8070
        env:
        - name: JAVA_OPTS
          value: "-Xmx256m"
        - name: SERVICE_PORT
          valueFrom:
            configMapKeyRef:
              name: tournament-service-config
              key: SERVICE_PORT
        - name: MONGODB_HOST
          valueFrom:
            configMapKeyRef:
              name: tournament-service-config
              key: MONGODB_HOST
        - name: MONGODB_PORT
          valueFrom:
            configMapKeyRef:
              name: tournament-service-config
              key: MONGODB_PORT
        - name: MONGODB_DATABASE
          valueFrom:
            configMapKeyRef:
              name: tournament-service-config
              key: MONGODB_DATABASE
        - name: KAFKA_ENABLED
          valueFrom:
            configMapKeyRef:
              name: tournament-service-config
              key: KAFKA_ENABLED
        - name: KAFKA_BOOTSTRAP_SERVERS
          valueFrom:
            configMapKeyRef:
              name: tournament-service-config
              key: KAFKA_BOOTSTRAP_SERVERS
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8070
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8070
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: tournament-service
  namespace: chess
spec:
  selector:
    app: tournament-service
  ports:
  - port: 8070
    targetPort: 8070
  type: ClusterIP
