apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init-script
  namespace: chess
data:
  init-postgres.sh: |
    #!/bin/bash
    set -e
    create_database() {
        local database=$1
        local user=$2
        echo "Creating database: $database"
        psql -v ON_ERROR_STOP=1 --username "$user" --dbname "$POSTGRES_DB" <<-EOSQL
            SELECT 'CREATE DATABASE $database'
            WHERE NOT EXISTS (SELECT FROM pg_database WHERE datname = '$database')\gexec
            GRANT ALL PRIVILEGES ON DATABASE $database TO $user;
    EOSQL
    }
    if [ -n "$POSTGRES_MULTIPLE_DATABASES" ]; then
        for db in $(echo $POSTGRES_MULTIPLE_DATABASES | tr ',' ' '); do
            create_database $db $POSTGRES_USER
        done
    fi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: chess
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: chess
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:15
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_DB
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_MULTIPLE_DATABASES
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_MULTIPLE_DATABASES
          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data
            - name: postgres-init
              mountPath: /docker-entrypoint-initdb.d
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      volumes:
        - name: postgres-storage
          persistentVolumeClaim:
            claimName: postgres-pvc
        - name: postgres-init
          configMap:
            name: postgres-init-script
            defaultMode: 0755
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: chess
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432