apiVersion: v1
kind: ConfigMap
metadata:
  name: web-frontend-config
  namespace: chess
data:
  REACT_APP_API_URL: http://localhost/v1
  REACT_APP_TOURNAMENT_API_URL: http://localhost/v1/tournaments
  API_UPSTREAM: rest-api.chess.svc.cluster.local:8080
  PLAYER_SERVICE_UPSTREAM: player-service.chess.svc.cluster.local:8090
  TOURNAMENT_SERVICE_UPSTREAM: tournament-service.chess.svc.cluster.local:8070
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-frontend
  namespace: chess
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web-frontend
  template:
    metadata:
      labels:
        app: web-frontend
    spec:
      containers:
      - name: web-frontend
        image: chess-web-frontend:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3000
        env:
        - name: REACT_APP_API_URL
          valueFrom:
            configMapKeyRef:
              name: web-frontend-config
              key: REACT_APP_API_URL
        - name: API_UPSTREAM
          valueFrom:
            configMapKeyRef:
              name: web-frontend-config
              key: API_UPSTREAM
        - name: TOURNAMENT_SERVICE_UPSTREAM
          valueFrom:
            configMapKeyRef:
              name: web-frontend-config
              key: TOURNAMENT_SERVICE_UPSTREAM
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "128Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: web-frontend
  namespace: chess
spec:
  selector:
    app: web-frontend
  ports:
  - port: 3000
    targetPort: 3000
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: chess-ingress
  namespace: chess
  annotations:
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "false"
spec:
  ingressClassName: nginx
  rules:
  - http:
      paths:
      - path: /v1/players
        pathType: Prefix
        backend:
          service:
            name: player-service
            port:
              number: 8090
      - path: /v1/tournaments
        pathType: Prefix
        backend:
          service:
            name: tournament-service
            port:
              number: 8070
      - path: /v1
        pathType: Prefix
        backend:
          service:
            name: rest-api
            port:
              number: 8080
      - path: /auth
        pathType: Prefix
        backend:
          service:
            name: keycloak
            port:
              number: 8080
      - path: /
        pathType: Prefix
        backend:
          service:
            name: web-frontend
            port:
              number: 3000
