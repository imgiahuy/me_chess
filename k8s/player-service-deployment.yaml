apiVersion: v1
kind: ConfigMap
metadata:
  name: player-service-config
  namespace: chess
data:
  SERVICE_PORT: "8090"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: player-service
  namespace: chess
spec:
  replicas: 1
  selector:
    matchLabels:
      app: player-service
  template:
    metadata:
      labels:
        app: player-service
    spec:
      containers:
      - name: player-service
        image: chess-player-service:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8090
        env:
        - name: JAVA_OPTS
          value: "-Xmx256m"
        - name: SERVICE_PORT
          valueFrom:
            configMapKeyRef:
              name: player-service-config
              key: SERVICE_PORT
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /v1/players/health
            port: 8090
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 10
        readinessProbe:
          httpGet:
            path: /v1/players/health
            port: 8090
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: player-service
  namespace: chess
spec:
  selector:
    app: player-service
  ports:
  - port: 8090
    targetPort: 8090
  type: ClusterIP
